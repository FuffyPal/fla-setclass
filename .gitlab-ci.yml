stages:
  - build
  - release

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"

default:
  image: mcr.microsoft.com/dotnet/sdk:8.0

build_plugin:
  stage: build
  before_script:
    - apt-get update && apt-get install -y mono-devel
    - mkdir -p References
  script:
    - dotnet restore
    - dotnet build -c Release
  artifacts:
    name: "Flasetclass-Plugin"
    paths:
      - bin/Release/net48/Flasetclass.dll
    expire_in: 1 day

publish_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for version $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Automatic release from GitLab CI/CD pipeline. Commit: $CI_COMMIT_SHA'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Flasetclass.dll'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/bin/Release/net48/Flasetclass.dll?job=build_plugin'